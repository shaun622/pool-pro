name: backup

# Full-database backup → the private pool-pro-backups repo, via pg_dump.
# This is a disaster-recovery copy that lives OUTSIDE Supabase, so it survives a
# total project wipe. It does NOT replace Supabase's own backups/PITR (verify +
# test those in the dashboard) — this is an independent second copy you control.
#
# FREQUENCY = the cron line below. Default is daily. Change it whenever:
#   weekly  -> '0 17 * * 0'      monthly -> '0 17 1 * *'
# You can also run it on demand any time from the Actions tab ("Run workflow").
#
# One-time setup (all in the web UI — see the repo README/plan):
#   1. Create a PRIVATE repo `pool-pro-backups`.
#   2. Add repo secrets to THIS repo (Settings → Secrets and variables → Actions):
#        SUPABASE_DB_URL  = Supabase → Database → Connection string → "Session pooler" (URI)
#        BACKUP_TOKEN     = fine-grained PAT, Contents:write on pool-pro-backups only
#   3. Actions tab → run this workflow once to confirm a dump lands in pool-pro-backups.

on:
  schedule:
    - cron: '0 17 * * *'   # daily ~03:00 AEST (17:00 UTC)
  workflow_dispatch: {}

# The private repo that receives the dumps. Change if you named it differently.
env:
  BACKUP_REPO: shaun622/pool-pro-backups
  RETAIN: '30'             # keep the newest N dumps in the working tree

concurrency:
  group: db-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL 17 client
        run: |
          set -euo pipefail
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          pg_dump --version

      - name: Dump database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_DB_URL:-}" ]; then
            echo "::error::SUPABASE_DB_URL secret is not set — finish the one-time setup (see backup.yml header)."
            exit 1
          fi
          TS="$(date -u +'%Y%m%d-%H%M%S')"
          FILE="poolpro-${TS}.sql.gz"
          echo "Dumping full database to ${FILE} ..."
          # pipefail makes a pg_dump failure fail the step even though gzip succeeds.
          pg_dump "$SUPABASE_DB_URL" --no-owner --no-privileges | gzip > "$FILE"
          test -s "$FILE"   # non-empty
          echo "Wrote $(du -h "$FILE" | cut -f1) — ${FILE}"
          echo "FILE=$FILE" >> "$GITHUB_ENV"

      - name: Commit to the private backup repo
        env:
          BACKUP_TOKEN: ${{ secrets.BACKUP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${BACKUP_TOKEN:-}" ]; then
            echo "::error::BACKUP_TOKEN secret is not set — finish the one-time setup (see backup.yml header)."
            exit 1
          fi
          git clone --depth 1 "https://x-access-token:${BACKUP_TOKEN}@github.com/${BACKUP_REPO}.git" backup-repo
          mkdir -p backup-repo/backups
          mv "$FILE" backup-repo/backups/
          cd backup-repo
          # Keep only the newest $RETAIN dumps in the tree (history still holds older ones).
          ls -1t backups/poolpro-*.sql.gz | tail -n +$(( RETAIN + 1 )) | xargs -r git rm -f
          git config user.name  "poolpro-backup-bot"
          git config user.email "backup-bot@users.noreply.github.com"
          git add backups/
          git commit -m "DB backup ${FILE}"
          git push
          echo "Pushed ${FILE} to ${BACKUP_REPO}"
